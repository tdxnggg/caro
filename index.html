<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cờ Caro Online & AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="lobby-container" id="lobbyScreen">
        <h2>VÀO PHÒNG CHƠI</h2>
        <input type="text" id="usernameInput" class="lobby-input" placeholder="Nhập tên của bạn..." maxlength="15">
        
        <div class="mode-selector">
            <button class="mode-btn active" id="modePVP">Chơi Online 🌐</button>
            <button class="mode-btn" id="modeAI">Đấu Với Máy 🤖</button>
        </div>

        <div id="pvpFields">
            <input type="text" id="roomInput" class="lobby-input" placeholder="Nhập mã phòng (để trống tự tạo)">
        </div>

        <div id="aiFields" style="display: none;">
            <select id="aiLevelSelect" class="lobby-select">
                <option value="easy">Cấp độ: Dễ (Máy đi bừa)</option>
                <option value="medium">Cấp độ: Trung Bình (Biết chặn nước đơn giản)</option>
                <option value="hard">Cấp độ: Khó (Siêu cấp AI - Tính toán thông minh)</option>
            </select>
        </div>

        <button class="btn" id="joinGameBtn" style="margin-top:5px; width:100%;">Bắt Đầu Chơi ✨</button>
    </div>

    <div class="leaderboard-container" id="leaderboardScreen">
        <h3>🏆 TOP CAO THỦ THẮNG NHIỀU</h3>
        <ul class="leaderboard-list" id="leaderboardList">
            <li class="leaderboard-item">Đang tải dữ liệu...</li>
        </ul>
    </div>

    <div class="game-view" id="gameScreen">
        <div class="game-layout">
            
            <div class="main-game-area">
                <h1>CỜ CARO</h1>
                
                <div class="scoreboard">
                    <div class="score-box">
                        <span class="role-label player-x">Player X</span>
                        <span class="player-name" id="nameX">Chờ...</span>
                        <span class="score-num" id="scoreX">0</span>
                    </div>
                    <div class="score-box">
                        <span class="role-label player-o">Player O</span>
                        <span class="player-name" id="nameO">Chờ...</span>
                        <span class="score-num" id="scoreO">0</span>
                    </div>
                </div>

                <div class="room-info">
                    Mã phòng: <span id="roomIdLabel" style="color: #ee5253; font-weight:800;">...</span>
                    <button class="btn btn-copy" id="copyLinkBtn">Copy Link</button>
                </div>
                
                <div class="status" id="status">Đang kết nối...</div>

                <div class="board-wrapper">
                    <div class="board" id="board"></div>
                </div>

                <div class="controls-wrapper">
                    <button class="btn" id="resetBtn" style="display:none;">Chơi Trận Mới ✨</button>
                    <button class="btn" id="leaveBtn">Thoát 🏠</button>
                </div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="chat-header">💬 KHUNG CHAT TRẬN ĐẤU</div>
                <div class="chat-messages" id="chatMessages"></div>
                
                <div class="chat-quick-panel">
                    <button class="quick-btn" data-msg="👍 Tuyệt cà là vời!">👍</button>
                    <button class="quick-btn" data-msg="🔥 hot hot hot!">🔥</button>
                    <button class="quick-btn" data-msg="😢 Cut rồi...">😢</button>
                    <button class="quick-btn" data-msg="🧠 Chơi cần não à ?.">🧠</button>
                    <button class="quick-btn" data-msg="🤣 Hahaha!">🤣</button>
                    <button class="quick-btn" data-msg="🤝 GG!">🤝</button>
                </div>

                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Nhập tin nhắn..." maxlength="50">
                    <button id="chatSendBtn" class="chat-send-btn">Gửi</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Hệ thống bảo mật Inspect -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', event => {
            if (event.keyCode === 123 || 
               (event.ctrlKey && event.shiftKey && [73, 67, 74].includes(event.keyCode)) || 
               (event.ctrlKey && event.keyCode === 85)) {
                event.preventDefault();
                return false;
            }
        });
        setInterval(function() {
            (function() { return false; }['constructor']('debugger')['call']());
        }, 50);
    </script>

    <!-- Nạp toàn bộ Module Logic -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
